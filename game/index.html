<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Skate 3D | Vector Flux v1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020202;
            --accent: #00ffaa;
            --secondary: #ff00ff;
            --text: #ffffff;
            --ui-border: rgba(255, 255, 255, 0.05);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Space Mono', monospace; color: var(--text); }
        canvas { display: block; filter: contrast(115%) brightness(110%); }
        
        #ui {
            position: absolute; inset: 0; pointer-events: none;
            padding: 40px; display: flex; flex-direction: column; justify-content: space-between;
            border: 1px solid var(--ui-border); box-sizing: border-box; margin: 20px;
            z-index: 100;
        }
        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .logo { font-size: 10px; line-height: 1.2; opacity: 0.6; }
        .score-wrap { text-align: right; }
        #score { font-size: 48px; font-weight: 700; color: var(--accent); text-shadow: 0 0 20px rgba(0,255,170,0.3); }
        #trick-name { font-size: 12px; color: var(--secondary); height: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .stats { display: flex; gap: 40px; }
        .stat-box { border-left: 2px solid var(--accent); padding-left: 15px; }
        .label { font-size: 8px; text-transform: uppercase; opacity: 0.4; margin-bottom: 5px; }
        .value { font-size: 20px; font-weight: 700; }
        
        #state-tag { color: var(--secondary); font-size: 10px; padding: 2px 6px; border: 1px solid var(--secondary); border-radius: 2px; display: inline-block; margin-top: 10px; }
        
        .hints { font-size: 8px; opacity: 0.3; max-width: 180px; text-align: right; line-height: 1.6; }
        
        #loading {
            position: fixed; inset: 0; background: var(--bg); display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .loader-bar { width: 160px; height: 1px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; margin-top: 20px; }
        .loader-bar::after { content: ''; position: absolute; inset: 0; background: var(--accent); transform: translateX(-100%); animation: load 2.5s cubic-bezier(0.65, 0, 0.35, 1) infinite; }
        @keyframes load { 100% { transform: translateX(100%); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="logo">VECTOR_FLUX_OS_BOOT...</div>
        <div class="loader-bar"></div>
    </div>
    
    <div id="ui">
        <div class="header">
            <div class="logo">KINETIC_FLOW_DAEMON<br>X_COORD: <span id="xpos">0</span><br>Y_COORD: <span id="ypos">0</span></div>
            <div class="score-wrap">
                <div id="trick-name">READY_FOR_FLUX</div>
                <div class="label">Accumulated_Data_Score</div>
                <div id="score">00000</div>
                <div id="state-tag">STATUS: GROUNDED</div>
            </div>
        </div>
        
        <div class="footer">
            <div class="stats">
                <div class="stat-box">
                    <div class="label">Magnitude_KMH</div>
                    <div class="value" id="speed">00.0</div>
                </div>
                <div class="stat-box">
                    <div class="label">Air_Density</div>
                    <div class="value" id="air">0.00%</div>
                </div>
            </div>
            <div class="hints">
                [UP_DOWN] VECTOR_THRUST<br>
                [LEFT_RIGHT] KINETIC_ROTATION<br>
                [SPACE] HYDRAULIC_OLLIE<br>
                [R] REBOOT_SIMULATION
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js",
                "anime": "https://unpkg.com/animejs@3.2.2/lib/anime.es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import anime from 'anime';

        // --- CONSTANTS ---
        const PLAYER_MASS = 15;
        const PUSH_FORCE = 3500;
        const TURN_SPEED = 0.02;
        const GRAVITY = -18;

        // --- ENGINE STATE ---
        let scene, camera, renderer, world;
        let skater, board, limbs = {};
        let physicsBodies = [];
        let score = 0, currentMoveScore = 0;
        let keys = {};
        let lastTime = 0;
        let isAirborne = false, isGrinding = false;
        let airRot = 0;
        let particles = [];

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 10, 100);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.VSMShadowMap;
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x0a0a0a, 10);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 1.2);
            directional.position.set(10, 50, 10);
            directional.castShadow = true;
            scene.add(directional);

            world = new CANNON.World();
            world.gravity.set(0, GRAVITY, 0);
            world.broadphase = new CANNON.SAPBroadphase(world);

            setupWorld();
            setupPlayer();
            
            // Entry animation
            anime({
                targets: '#loading',
                opacity: 0,
                duration: 1200,
                delay: 2000,
                easing: 'easeInOutExpo',
                complete: () => document.getElementById('loading').remove()
            });

            requestAnimationFrame(loop);
        }

        function setupWorld() {
            // Ground
            const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
            groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
            world.addBody(groundBody);

            const grid = new THREE.GridHelper(600, 120, 0x00ffaa, 0x050505);
            scene.add(grid);

            // Level Design
            createObstacle(new CANNON.Vec3(0, 1, -30), new CANNON.Vec3(15, 2, 12), 0.35, 0x111111); // Main Ramp
            createRail(new CANNON.Vec3(20, 1, -50), new CANNON.Vec3(25, 0.2, 0.2)); // Long Rail X
            createRail(new CANNON.Vec3(-20, 1, -50), new CANNON.Vec3(0.2, 0.2, 25)); // Long Rail Z
            createObstacle(new CANNON.Vec3(-30, 2, -100), new CANNON.Vec3(20, 4, 15), -0.2, 0x080808); // Mega Ramp
        }

        function createObstacle(pos, size, rotX = 0, color = 0x111111) {
            const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(size.x/2, size.y/2, size.z/2)) });
            body.position.copy(pos);
            body.quaternion.setFromEuler(rotX, 0, 0);
            world.addBody(body);

            const mesh = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z), new THREE.MeshStandardMaterial({ color, roughness: 0.1 }));
            mesh.position.copy(body.position);
            mesh.quaternion.copy(body.quaternion);
            mesh.castShadow = mesh.receiveShadow = true;
            scene.add(mesh);
            
            const wire = new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({ color: 0x00ffaa, opacity: 0.15, transparent: true }));
            mesh.add(wire);
        }

        function createRail(pos, size) {
            const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(size.x/2, size.y/2, size.z/2)) });
            body.position.copy(pos);
            body.userData = { type: 'rail' };
            world.addBody(body);

            const mesh = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00ffaa, emissiveIntensity: 0.5 }));
            mesh.position.copy(body.position);
            mesh.castShadow = true;
            scene.add(mesh);
        }

        function setupPlayer() {
            // Skateboard
            skater = new CANNON.Body({
                mass: PLAYER_MASS,
                shape: new CANNON.Box(new CANNON.Vec3(0.4, 0.1, 1)),
                position: new CANNON.Vec3(0, 5, 0),
                angularDamping: 0.8
            });
            
            skater.addEventListener('collide', (e) => {
                if(e.body.userData && e.body.userData.type === 'rail') {
                    if(skater.position.y > e.body.position.y + 0.1) {
                        isGrinding = true;
                        isAirborne = false;
                        skater.velocity.y = 0;
                        skater.position.y = e.body.position.y + 0.3;
                    }
                }
            });
            
            world.addBody(skater);

            board = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.15, 2.3), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            board.castShadow = true;
            scene.add(board);
            physicsBodies.push({ body: skater, mesh: board });

            // ENHANCED Stick Figure
            const group = new THREE.Group();
            scene.add(group);
            const stickMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            // Torso
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.9), stickMat);
            torso.position.y = 1.1;
            group.add(torso);

            // Head
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.2), stickMat);
            head.position.y = 1.7;
            group.add(head);

            // Limbs
            const partInfo = {
                L_Arm: [-0.25, 1.3], R_Arm: [0.25, 1.3],
                L_Leg: [-0.18, 0.45], R_Leg: [0.18, 0.45]
            };
            for (let name in partInfo) {
                const limbGroup = new THREE.Group();
                limbGroup.position.set(partInfo[name][0], partInfo[name][1], 0);
                const bone = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.7), stickMat);
                bone.position.y = -0.35;
                limbGroup.add(bone);
                group.add(limbGroup);
                limbs[name] = limbGroup;
            }
            limbs.main = group;

            // Trucks
            const truckGeo = new THREE.BoxGeometry(0.7, 0.1, 0.1);
            const t1 = new THREE.Mesh(truckGeo, stickMat); t1.position.set(0, -0.15, 0.75);
            const t2 = new THREE.Mesh(truckGeo, stickMat); t2.position.set(0, -0.15, -0.75);
            board.add(t1); board.add(t2);
        }

        // --- CONTROLS ---
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function handleInput(dt) {
            if(isGrinding) {
                if(keys['Space']) {
                    isGrinding = false; isAirborne = true;
                    skater.velocity.y = 10;
                }
                return;
            }

            const power = PUSH_FORCE * dt;
            const turn = TURN_SPEED * (isAirborne ? 5 : 1.2);

            if (keys['ArrowUp'] || keys['KeyW']) {
                const f = new CANNON.Vec3(0, 0, -power);
                skater.quaternion.vmult(f, f);
                skater.applyForce(f, skater.position);
            }
            if (keys['ArrowDown'] || keys['KeyS']) {
                const f = new CANNON.Vec3(0, 0, power / 2);
                skater.quaternion.vmult(f, f);
                skater.applyForce(f, skater.position);
            }
            if (keys['ArrowLeft'] || keys['KeyA']) skater.angularVelocity.y += turn;
            if (keys['ArrowRight'] || keys['KeyD']) skater.angularVelocity.y -= turn;

            if (keys['Space'] && !isAirborne && skater.position.y < 0.6) {
                skater.velocity.y = 10;
                isAirborne = true;
                airRot = 0;
                spawnFX(skater.position, 0x00ffaa);
            }
            if (keys['KeyR']) location.reload();
        }

        function spawnFX(pos, col) {
            for(let i=0; i<12; i++){
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.06,0.06), new THREE.MeshBasicMaterial({color:col}));
                p.position.copy(pos);
                p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.4, Math.random()*0.4, (Math.random()-0.5)*0.4), life: 1 };
                scene.add(p);
                particles.push(p);
            }
        }

        function loop(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            requestAnimationFrame(loop);
            handleInput(dt);
            world.step(1/60);

            // Sync
            physicsBodies.forEach(b => {
                b.mesh.position.copy(b.body.position);
                b.mesh.quaternion.copy(b.body.quaternion);
            });

            // UI and State Logic
            const st = document.getElementById('state-tag');
            const tn = document.getElementById('trick-name');
            
            if (isGrinding) {
                st.innerText = 'STATUS: KINETIC_GRIND';
                st.style.borderColor = '#ff00ff';
                currentMoveScore += 2;
                tn.innerText = 'SLIDING_RAIL';
                if(Math.random() > 0.8) spawnFX(skater.position, 0xff00ff);
            } else if (isAirborne) {
                st.innerText = 'STATUS: AIR_TRANSLATION';
                st.style.borderColor = '#00ffaa';
                const rot = Math.abs(skater.angularVelocity.y) * dt * 60;
                airRot += rot;
                currentMoveScore += rot * 15;
                
                if (airRot > 10) tn.innerText = '360_FLUX_SPIN';
                if (airRot > 25) tn.innerText = '720_HYDRA_SPIN';
                if (airRot > 50) tn.innerText = 'X_STATIC_STORM';
            } else {
                st.innerText = 'STATUS: GROUNDED';
                st.style.borderColor = '#ffffff';
            }

            // Landing
            if (isAirborne && skater.position.y < 0.35 && skater.velocity.y <= 0) {
                isAirborne = false;
                if (currentMoveScore > 20) {
                    score += Math.round(currentMoveScore);
                    document.getElementById('score').innerText = score.toString().padStart(5, '0');
                    spawnFX(skater.position, 0xffffff);
                    anime({ targets: '#trick-name', opacity: [1, 0], duration: 1500, delay: 500 });
                }
                currentMoveScore = 0;
            }

            // Procedural Player
            const main = limbs.main;
            main.position.copy(skater.position);
            main.position.y += 0.5;
            main.quaternion.slerp(skater.quaternion, 0.25);

            // Anim Rigging
            const t = time * 0.005;
            const tilt = skater.angularVelocity.y * 2;
            limbs.L_Arm.rotation.z = Math.sin(t) * 0.4 + tilt;
            limbs.R_Arm.rotation.z = -Math.sin(t) * 0.4 + tilt;
            
            if (keys['ArrowUp'] || keys['KeyW']) {
                limbs.R_Leg.rotation.x = Math.sin(t*4) * 1.6;
            } else {
                limbs.R_Leg.rotation.x = -0.2;
            }

            // High-Performance Camera
            const camTarget = new THREE.Vector3().copy(skater.position);
            const camOffset = new THREE.Vector3(0, 5, 12).applyQuaternion(skater.quaternion);
            camera.position.lerp(camTarget.clone().add(camOffset), 0.1);
            camera.lookAt(camTarget);

            // Stats UI
            document.getElementById('speed').innerText = (skater.velocity.length() * 3.6).toFixed(1);
            document.getElementById('air').innerText = Math.max(0, (skater.position.y * 5)).toFixed(1) + 'M';
            document.getElementById('xpos').innerText = Math.round(skater.position.x);
            document.getElementById('ypos').innerText = Math.round(skater.position.z);

            // Particle Physics
            for(let i=particles.length-1; i>=0; i--){
                const p = particles[i];
                p.position.add(p.userData.vel);
                p.userData.life -= 0.04;
                p.scale.setScalar(Math.max(0, p.userData.life));
                if(p.userData.life <= 0){ scene.remove(p); particles.splice(i,1); }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
